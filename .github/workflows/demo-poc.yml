
name: GARVIS PoC CI - Backend & Frontend Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend repo (garvis42)
        uses: actions/checkout@v4
        with:
          repository: jonpearlandpig/garvis42
          path: garvis42
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garvis42/backend/requirements.txt
      - name: Install backend dependencies
        working-directory: garvis42/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fail if GROQ_API_KEY is required but not set (guard)
        run: |
          if grep -q 'groq' requirements.txt && [ -z "$GROQ_API_KEY" ]; then echo "GROQ_API_KEY not set"; exit 1; fi
        working-directory: garvis42/backend
      - name: Run backend tests
        working-directory: garvis42/backend
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend repo (garvis-command-center)
        uses: actions/checkout@v4
        with:
          repository: jonpearlandpig/garvis-command-center
          path: garvis-command-center
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: garvis-command-center/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: garvis-command-center/frontend
        run: |
          npm ci
      - name: Run frontend tests
        working-directory: garvis-command-center/frontend
        run: npm test

  set-groq-key:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
      - name: Set GROQ_API_KEY (example)
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >.groq_env
      - name: Export GROQ key for tests
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> $GITHUB_ENV
